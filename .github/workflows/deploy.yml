name: Deploy frontend h5

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-h5
  cancel-in-progress: true

env:
  TARGET_DIR: /www/wwwroot/gl.oksja.cn
  ARCHIVE_NAME: frontend-h5-dist.tar.gz
  BACKEND_PORT: 9090

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build H5
        env:
          UNI_INPUT_DIR: ${{ github.workspace }}
        run: npx uni build -p h5

      - name: Pack H5 dist
        run: tar -czf "$ARCHIVE_NAME" -C dist/build/h5 .

      - name: Upload H5 archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: ${{ env.ARCHIVE_NAME }}
          target: /tmp
          overwrite: true

      - name: Publish frontend H5
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: false
          script: |
            set -e

            TARGET_DIR="${{ env.TARGET_DIR }}"
            ARCHIVE="/tmp/${{ env.ARCHIVE_NAME }}"

            if [ ! -f "$ARCHIVE" ]; then
              echo "Archive not found: $ARCHIVE"
              exit 1
            fi

            mkdir -p "$TARGET_DIR"
            find "$TARGET_DIR" -mindepth 1 -maxdepth 1 ! -name ".user.ini" -exec rm -rf {} +
            tar -xzf "$ARCHIVE" -C "$TARGET_DIR"
            rm -f "$ARCHIVE"
            chown -R www:www "$TARGET_DIR" 2>/dev/null || true

            CONF="/www/server/panel/vhost/nginx/gl.oksja.cn.conf"
            BACKEND_PORT="${{ env.BACKEND_PORT }}"
            if [ -f "$CONF" ]; then
              BLOCK_FILE="$(mktemp)"
              cat > "$BLOCK_FILE" <<EOF
                # codex-sqms-proxy-start
                location ^~ /sqms/ {
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_pass http://127.0.0.1:$BACKEND_PORT;
                }
                # codex-sqms-proxy-end
            EOF
              sed -i '/# codex-sqms-proxy-start/,/# codex-sqms-proxy-end/d' "$CONF"
              TMP_CONF="$(mktemp)"
              awk -v block="$(cat "$BLOCK_FILE")" '
                { lines[NR] = $0 }
                END {
                  last = 0
                  for (i = NR; i >= 1; i--) {
                    if (lines[i] ~ /^}/) { last = i; break }
                  }
                  for (i = 1; i <= NR; i++) {
                    if (i == last) print block
                    print lines[i]
                  }
                }
              ' "$CONF" > "$TMP_CONF"
              cat "$TMP_CONF" > "$CONF"
              rm -f "$BLOCK_FILE" "$TMP_CONF"
            fi

            if command -v nginx >/dev/null 2>&1; then
              nginx -t && (systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || true)
            fi
