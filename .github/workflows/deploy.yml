name: Deploy frontend h5

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-h5
  cancel-in-progress: true

env:
  TARGET_DIR: /www/wwwroot/gl.oksja.cn
  ARCHIVE_NAME: frontend-h5-dist.tar.gz
  BACKEND_PORT: 9090

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build H5
        env:
          UNI_INPUT_DIR: ${{ github.workspace }}
        run: npx uni build -p h5

      - name: Pack H5 dist
        run: tar -czf "$ARCHIVE_NAME" -C dist/build/h5 .

      - name: Upload H5 archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: ${{ env.ARCHIVE_NAME }}
          target: /tmp
          overwrite: true

      - name: Publish frontend H5
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: false
          script: |
            set -e

            TARGET_DIR="${{ env.TARGET_DIR }}"
            ARCHIVE="/tmp/${{ env.ARCHIVE_NAME }}"

            if [ ! -f "$ARCHIVE" ]; then
              echo "Archive not found: $ARCHIVE"
              exit 1
            fi

            mkdir -p "$TARGET_DIR"
            find "$TARGET_DIR" -mindepth 1 -maxdepth 1 ! -name ".user.ini" -exec rm -rf {} +
            tar -xzf "$ARCHIVE" -C "$TARGET_DIR"
            rm -f "$ARCHIVE"
            chown -R www:www "$TARGET_DIR" 2>/dev/null || true

            CONF="/www/server/panel/vhost/nginx/gl.oksja.cn.conf"
            BACKEND_PORT="${{ env.BACKEND_PORT }}"
            if [ -f "$CONF" ]; then
              PYTHON_BIN="$(command -v python3 || command -v python || true)"
              if [ -z "$PYTHON_BIN" ]; then
                echo "python3/python command not found on server"
                exit 1
              fi
              "$PYTHON_BIN" - "$CONF" "$BACKEND_PORT" <<'PY'
            import re
            import sys
            from pathlib import Path

            path = Path(sys.argv[1])
            backend_port = sys.argv[2]
            lines = path.read_text(encoding="utf-8").splitlines()
            next_lines = []
            i = 0
            sqms_location = re.compile(r"^\s*location\b(?=[^{;]*sqms)", re.IGNORECASE)

            def skip_nginx_block(start_index):
                index = start_index
                depth = 0
                saw_open_brace = False
                while index < len(lines):
                    current = lines[index]
                    depth += current.count("{") - current.count("}")
                    saw_open_brace = saw_open_brace or "{" in current
                    index += 1
                    if saw_open_brace and depth <= 0:
                        break
                    if not saw_open_brace and current.strip().endswith(";"):
                        break
                return index

            while i < len(lines):
                line = lines[i]
                if "# codex-sqms-proxy-start" in line:
                    i += 1
                    while i < len(lines) and "# codex-sqms-proxy-end" not in lines[i]:
                        i += 1
                    if i < len(lines):
                        i += 1
                    continue
                if sqms_location.search(line):
                    i = skip_nginx_block(i)
                    continue
                next_lines.append(line)
                i += 1

            block = [
                "    # codex-sqms-proxy-start",
                "    location ^~ /sqms/ {",
                "        proxy_set_header Host $host;",
                "        proxy_set_header X-Real-IP $remote_addr;",
                "        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;",
                "        proxy_set_header X-Forwarded-Proto $scheme;",
                f"        proxy_pass http://127.0.0.1:{backend_port};",
                "    }",
                "    # codex-sqms-proxy-end",
            ]
            insert_at = len(next_lines)
            for index in range(len(next_lines) - 1, -1, -1):
                if next_lines[index].strip() == "}":
                    insert_at = index
                    break
            next_lines[insert_at:insert_at] = block
            path.write_text("\n".join(next_lines) + "\n", encoding="utf-8")
            print("sqms lines after normalize:")
            for line_number, line in enumerate(next_lines, start=1):
                if "sqms" in line.lower():
                    print(f"{line_number}: {line}")
            PY
            fi

            if command -v nginx >/dev/null 2>&1; then
              nginx -t && (systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || true)
            fi
