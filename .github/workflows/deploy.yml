name: Deploy frontend h5

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-h5
  cancel-in-progress: true

env:
  TARGET_DIR: /www/wwwroot/www.wsh1798.cn
  ARCHIVE_NAME: frontend-h5-dist.tar.gz
  BACKEND_PORT: 9090

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build H5
        env:
          UNI_INPUT_DIR: ${{ github.workspace }}
        run: npx uni build -p h5

      - name: Pack H5 dist
        run: tar -czf "$ARCHIVE_NAME" -C dist/build/h5 .

      - name: Upload H5 archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: ${{ env.ARCHIVE_NAME }}
          target: /tmp
          overwrite: true

      - name: Publish frontend H5
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: false
          script: |
            set -e

            TARGET_DIR="${{ env.TARGET_DIR }}"
            ARCHIVE="/tmp/${{ env.ARCHIVE_NAME }}"

            if [ ! -f "$ARCHIVE" ]; then
              echo "Archive not found: $ARCHIVE"
              exit 1
            fi

            mkdir -p "$TARGET_DIR"
            find "$TARGET_DIR" -mindepth 1 -maxdepth 1 ! -name ".user.ini" -exec rm -rf {} +
            tar -xzf "$ARCHIVE" -C "$TARGET_DIR"
            rm -f "$ARCHIVE"
            chown -R www:www "$TARGET_DIR" 2>/dev/null || true

            CONF="/www/server/panel/vhost/nginx/www.wsh1798.cn.conf"
            BACKEND_PORT="${{ env.BACKEND_PORT }}"
            if [ -f "$CONF" ]; then
              PYTHON_BIN="$(command -v python3 || command -v python || true)"
              if [ -z "$PYTHON_BIN" ]; then
                echo "python3/python command not found on server"
                exit 1
              fi
              "$PYTHON_BIN" - "$CONF" "$BACKEND_PORT" <<'PY'
            import glob
            import re
            import sys
            from pathlib import Path

            path = Path(sys.argv[1])
            backend_port = sys.argv[2]
            lines = path.read_text(encoding="utf-8").splitlines()
            sqms_location = re.compile(r"^\s*location\b(?=[^{;]*sqms)", re.IGNORECASE)

            def skip_nginx_block(source_lines, start_index):
                index = start_index
                depth = 0
                saw_open_brace = False
                while index < len(source_lines):
                    current = source_lines[index]
                    depth += current.count("{") - current.count("}")
                    saw_open_brace = saw_open_brace or "{" in current
                    index += 1
                    if saw_open_brace and depth <= 0:
                        break
                    if not saw_open_brace and current.strip().endswith(";"):
                        break
                return index

            def remove_sqms_blocks(source_lines):
                cleaned = []
                removed = 0
                i = 0
                while i < len(source_lines):
                    line = source_lines[i]
                    if "# codex-sqms-proxy-start" in line:
                        removed += 1
                        i += 1
                        while i < len(source_lines) and "# codex-sqms-proxy-end" not in source_lines[i]:
                            i += 1
                        if i < len(source_lines):
                            i += 1
                        continue
                    if sqms_location.search(line):
                        removed += 1
                        i = skip_nginx_block(source_lines, i)
                        continue
                    cleaned.append(line)
                    i += 1
                return cleaned, removed

            include_patterns = []
            for line in lines:
                match = re.match(r"^\s*include\s+([^;]+);", line)
                if match:
                    include_patterns.append(match.group(1).strip().strip("'\""))
            include_patterns.extend([
                "/www/server/panel/vhost/nginx/proxy/www.wsh1798.cn/*.conf",
                "/www/server/panel/vhost/rewrite/www.wsh1798.cn.conf",
            ])

            include_files = []
            seen_paths = {path.resolve()}
            for pattern in include_patterns:
                for match in glob.glob(pattern):
                    include_path = Path(match)
                    if not include_path.is_file():
                        continue
                    resolved = include_path.resolve()
                    if resolved in seen_paths:
                        continue
                    seen_paths.add(resolved)
                    include_files.append(include_path)

            for include_path in include_files:
                include_lines = include_path.read_text(encoding="utf-8").splitlines()
                cleaned_include, removed = remove_sqms_blocks(include_lines)
                if removed:
                    include_path.write_text("\n".join(cleaned_include) + "\n", encoding="utf-8")
                    print(f"removed {removed} sqms location block(s) from include: {include_path}")

            next_lines, removed_main = remove_sqms_blocks(lines)
            if removed_main:
                print(f"removed {removed_main} sqms location block(s) from main config")

            block = [
                "    # codex-sqms-proxy-start",
                "    location ^~ /sqms/ {",
                "        proxy_set_header Host $host;",
                "        proxy_set_header X-Real-IP $remote_addr;",
                "        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;",
                "        proxy_set_header X-Forwarded-Proto $scheme;",
                f"        proxy_pass http://127.0.0.1:{backend_port};",
                "    }",
                "    # codex-sqms-proxy-end",
            ]
            insert_at = len(next_lines)
            for index in range(len(next_lines) - 1, -1, -1):
                if next_lines[index].strip() == "}":
                    insert_at = index
                    break
            next_lines[insert_at:insert_at] = block
            path.write_text("\n".join(next_lines) + "\n", encoding="utf-8")
            print("sqms lines after normalize:")
            for line_number, line in enumerate(next_lines, start=1):
                if "sqms" in line.lower():
                    print(f"{line_number}: {line}")
            PY
            fi

            if command -v nginx >/dev/null 2>&1; then
              nginx -t && (systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || true)
            fi
